<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HearthNet — Live Protocol Trace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <path d="M13 3C13 3 7 10 7 15.5C7 18.8 9.7 21.5 13 21.5C16.3 21.5 19 18.8 19 15.5C19 10 13 3 13 3Z" fill="#d4863a" opacity="0.3"/>
          <path d="M13 9C13 9 10 13.5 10 16C10 17.7 11.3 19 13 19C14.7 19 16 17.7 16 16C16 13.5 13 9 13 9Z" fill="#d4863a"/>
        </svg>
      </div>
      <div class="logo-text">
        <h1>HearthNet</h1>
        <span class="subtitle">Protocol Trace</span>
      </div>
    </div>
    <div class="header-center">
      <div class="agent-roster" id="agent-roster">
        <div class="agent-chip" data-agent="user"><span class="chip-dot"></span><span class="chip-name">User</span><span class="chip-role">Human</span></div>
        <div class="agent-chip" data-agent="rupert"><span class="chip-dot"></span><span class="chip-name">Rupert</span><span class="chip-role">Root Orchestrator</span></div>
        <div class="agent-chip" data-agent="jeeves"><span class="chip-dot"></span><span class="chip-name">Jeeves</span><span class="chip-role">Home Assistant Mgr</span></div>
        <div class="agent-chip" data-agent="darcy"><span class="chip-dot"></span><span class="chip-name">Darcy</span><span class="chip-role">Mobile Mgr</span></div>
        <div class="agent-chip" data-agent="dewey"><span class="chip-dot"></span><span class="chip-name">Dewey</span><span class="chip-role">Librarian / Git</span></div>
      </div>
    </div>
    <div class="status-cluster">
      <div class="status-pill" id="head-badge">
        <span class="pill-label">HEAD</span>
        <span class="pill-value" id="head-value">...</span>
      </div>
      <div class="status-pill" id="commit-pill">
        <span class="pill-value" id="commit-count">0</span>
        <span class="pill-label">commits</span>
      </div>
      <div class="live-indicator" id="live-dot">
        <span class="live-ring"></span>
        <span class="live-core"></span>
      </div>
    </div>
  </header>

  <!-- Primary mode tabs -->
  <div class="toolbar">
    <div class="mode-tabs" id="mode-tabs">
      <button class="mode-tab" data-mode="live">
        <span class="mode-dot live-mode-dot"></span>
        <span class="mode-label">Live Monitor</span>
      </button>
      <button class="mode-tab active" data-mode="replay">
        <svg class="mode-icon" width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 3l5 4-5 4V3z" fill="currentColor"/><path d="M8 3l5 4-5 4V3z" fill="currentColor" opacity="0.5"/></svg>
        <span class="mode-label">Replay</span>
      </button>
    </div>

    <!-- Live mode: just scroll-to-bottom -->
    <div class="toolbar-right" id="live-toolbar" style="display:none">
      <button class="tool-btn" id="btn-scroll-bottom" title="Scroll to latest">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M3 8l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- Replay mode: scene sub-tabs -->
    <div class="scene-tabs" id="scene-tabs">
      <button class="scene-tab active" data-scene="all"><span class="tab-key">All</span></button>
      <button class="scene-tab" data-scene="scene1"><span class="tab-num">1</span><span class="tab-label">Coordinated Actuation</span></button>
      <button class="scene-tab" data-scene="scene2"><span class="tab-num">2</span><span class="tab-label">Conflict Resolution</span></button>
      <button class="scene-tab" data-scene="scene3"><span class="tab-num">3</span><span class="tab-label">Freshness Verification</span></button>
    </div>
  </div>

  <!-- Replay transport controls — visible only in replay mode -->
  <div class="replay-bar" id="replay-bar">
    <button class="replay-btn" id="replay-reset" title="Reset">⏮</button>
    <button class="replay-btn" id="replay-prev" title="Previous">⏪</button>
    <button class="replay-btn replay-play" id="replay-toggle" title="Play/Pause">▶</button>
    <button class="replay-btn" id="replay-next" title="Next">⏩</button>
    <button class="replay-btn" id="replay-end" title="Jump to end">⏭</button>
    <div class="replay-progress">
      <input type="range" id="replay-slider" min="0" max="0" value="0" class="replay-slider">
    </div>
    <div class="replay-speed">
      <label>Speed</label>
      <select id="replay-speed">
        <option value="2000">0.5×</option>
        <option value="1000" selected>1×</option>
        <option value="500">2×</option>
        <option value="250">4×</option>
      </select>
    </div>
    <span class="replay-counter" id="replay-counter">0 / 0</span>
  </div>

  <main>
    <!-- Topology Graph -->
    <div class="topo-panel" id="topo-panel">
      <div class="topo-header">
        <span class="topo-title">Agent Topology</span>
      </div>
      <svg id="topo-svg" viewBox="0 0 260 340" preserveAspectRatio="xMidYMid meet">
        <circle id="topo-user" cx="130" cy="40" r="18" fill="var(--agent-user)" opacity="0.2" stroke="var(--agent-user)" stroke-width="1.5"/>
        <text x="130" y="44" text-anchor="middle" fill="var(--agent-user)" font-size="10" font-weight="700" font-family="var(--font-body)">User</text>

        <circle id="topo-rupert" cx="130" cy="130" r="22" fill="var(--agent-rupert)" opacity="0.2" stroke="var(--agent-rupert)" stroke-width="1.5"/>
        <text x="130" y="127" text-anchor="middle" fill="var(--agent-rupert)" font-size="10" font-weight="700" font-family="var(--font-body)">Rupert</text>
        <text x="130" y="139" text-anchor="middle" fill="var(--text-muted)" font-size="8" font-family="var(--font-body)">root</text>

        <circle id="topo-jeeves" cx="50" cy="230" r="18" fill="var(--agent-jeeves)" opacity="0.2" stroke="var(--agent-jeeves)" stroke-width="1.5"/>
        <text x="50" y="227" text-anchor="middle" fill="var(--agent-jeeves)" font-size="10" font-weight="700" font-family="var(--font-body)">Jeeves</text>
        <text x="50" y="239" text-anchor="middle" fill="var(--text-muted)" font-size="8" font-family="var(--font-body)">HA mgr</text>

        <circle id="topo-darcy" cx="210" cy="230" r="18" fill="var(--agent-darcy)" opacity="0.2" stroke="var(--agent-darcy)" stroke-width="1.5"/>
        <text x="210" y="227" text-anchor="middle" fill="var(--agent-darcy)" font-size="10" font-weight="700" font-family="var(--font-body)">Darcy</text>
        <text x="210" y="239" text-anchor="middle" fill="var(--text-muted)" font-size="8" font-family="var(--font-body)">mobile</text>

        <circle id="topo-dewey" cx="130" cy="310" r="18" fill="var(--agent-dewey)" opacity="0.2" stroke="var(--agent-dewey)" stroke-width="1.5"/>
        <text x="130" y="307" text-anchor="middle" fill="var(--agent-dewey)" font-size="10" font-weight="700" font-family="var(--font-body)">Dewey</text>
        <text x="130" y="319" text-anchor="middle" fill="var(--text-muted)" font-size="8" font-family="var(--font-body)">librarian</text>

        <g id="topo-edges"></g>
      </svg>
    </div>

    <section class="timeline-container">
      <div class="timeline" id="timeline">
        <!-- Commits render here -->
      </div>
    </section>

    <aside class="detail-panel" id="detail-panel">
      <div class="detail-empty">
        <p>Select an event to inspect</p>
      </div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
